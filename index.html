    <div id="editPhotoModal" class="modal" style="display: none;">

            <span id="closeEditPhoto" class="close" onclick="document.querySelector('#editPhotoModal').style.display = 'none'">&times;</span>
            <h2>Edit Profile Picture</h2>
            <input type="file" id="photoUpload" accept="image/*">
            <button id="uploadBtn">Upload</button>
        </div>
    </div>

        <div id="loginModal-overlay" class="modal-overlay"></div>
        <div class="modal-content" id="loginModal" style="display: none;">
            <form>
            <span id="closeLogin" class="close" onclick="document.querySelector('#loginModal').style.display = 'none'">&times;</span>
            <h2>Login</h2>
            <input type="text" placeholder="Username" style="width: 50%; margin-bottom: 10px;" required id="username">
            <input type="password" name="confirmPassword" placeholder="Password" style="width: 50%; margin-bottom: 10px;" required id="password">
            <span id="passwordError" class="error"></span>
            <p id="message" class="message"></p>
            <div class="btn">
                <button type="submit" class="submit-btn" id="submitBtn" onclick="loginForm(event)"><span>Submit</span></button>
            </div>
            </form>
        </div>

    <button id="bookBtn" onclick="document.querySelectorAll('#calendarDiv').forEach(div => div.style.display = 'block')">Book Now</button>
